<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Dashboard</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Notre CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hex-grid">

        <!-- Rangée 1 -->
        <div class="hex-row">
            <div class="hex">
                <div class="hex-inner">
                    <i class="fas fa-home"></i>
                    <span>Accueil</span>
                </div>
            </div>
            <div class="hex">
                <div class="hex-inner">
                    <i class="fas fa-user"></i>
                    <span>Profil</span>
                </div>
            </div>
            <div class="hex">
                <div class="hex-inner">
                    <i class="fas fa-cog"></i>
                    <span>Paramètres</span>
                </div>
            </div>
        </div>

        <!-- Rangée 2 — décalée -->
        <div class="hex-row hex-row--offset">
            <div class="hex">
                <div class="hex-inner">
                    <i class="fas fa-chart-bar"></i>
                    <span>Stats</span>
                </div>
            </div>
            <div class="hex">
                <div class="hex-inner">
                    <i class="fas fa-envelope"></i>
                    <span>Messages</span>
                </div>
            </div>
            <div class="hex">
                <div class="hex-inner">
                    <i class="fas fa-bell"></i>
                    <span>Alertes</span>
                </div>
            </div>
        </div>

        <!-- Rangée 3 -->
        <div class="hex-row">
            <div class="hex">
                <div class="hex-inner">
                    <i class="fas fa-calendar"></i>
                    <span>Agenda</span>
                </div>
            </div>
            <div class="hex">
                <div class="hex-inner">
                    <i class="fas fa-map"></i>
                    <span>Carte</span>
                </div>
            </div>
            <div class="hex">
                <div class="hex-inner">
                    <i class="fas fa-file"></i>
                    <span>Fichiers</span>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
